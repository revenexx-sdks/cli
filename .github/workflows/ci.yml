name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      # Lint and typecheck are advisory while the generated service surface
      # still has known violations. Tests are required.
      - name: Lint (advisory)
        continue-on-error: true
        run: npm run lint

      - name: Typecheck (advisory)
        continue-on-error: true
        run: npx tsc --noEmit -p tsconfig.json

      - name: Test
        run: npm test

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Node dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Verify CLI runs with Node
        run: node dist/cli.mjs -v

      # Drives the built bundle in a real pseudo-terminal: shell renders,
      # palette opens, session quits. No gateway credentials involved.
      - name: TUI pty smoke test
        run: bash scripts/tui-smoke.sh

      - name: Verify npm package can be built
        run: npm pack

      - name: Install dependencies
        run: bun install

      - name: Build all platform binaries
        run: |
          rm -rf build
          mkdir -p build
          bun run linux-x64
          bun run linux-arm64
          bun run windows-x64
          bun run windows-arm64
          bun run mac-x64
          bun run mac-arm64

      - name: Verify generated binaries
        run: |
          test -s build/revenexx-linux-x64
          test -s build/revenexx-linux-arm64
          test -s build/revenexx-win-x64.exe
          test -s build/revenexx-win-arm64.exe
          test -s build/revenexx-darwin-x64
          test -s build/revenexx-darwin-arm64
